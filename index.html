<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŞRK-3 ULTRA</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #020617, #000);
    color:white;
}
header{
    text-align:center;
    padding:20px;
    font-size:28px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}
.container{max-width:750px;margin:auto;padding:15px}
.card{
    background:rgba(255,255,255,0.06);
    padding:16px;
    border-radius:14px;
    margin:10px 0;
}
input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
}
input,select{background:#111;color:white}
button{background:linear-gradient(90deg,#00f7ff,#0066ff);font-weight:bold;cursor:pointer}
pre{white-space:pre-wrap;background:#0b0b0b;padding:14px;border-radius:10px;min-height:320px}
</style>
</head>

<body>

<header>🎵 ŞRK-3 SONG ENGINE</header>

<div class="container">

<div class="card">
<input id="inputField" placeholder="Şarkı adı">
<select id="mode">
<option value="love">💔 Aşk</option>
<option value="sad">😢 Üzüntü</option>
<option value="fun">😊 Eğlence</option>
<option value="night">🌙 Gece</option>
<option value="rap">🎤 Rap</option>
<option value="happy">🌈 Mutlu</option>
</select>
<button onclick="generate()">Üret</button>
</div>

<div class="card">
<pre id="out">Hazır...</pre>
</div>

</div>

<script>

const vocab = {
love:{
nouns:["renkli","gece","kalp","rüya","ışık","deniz","zaman","enerji"],
verbs:["koşar","parlar","döner","akar","güler","söner","uçurur"],
adj:["güzel","hızlı","derin","sessiz","büyülü","çılgın"]
},
sad:{
nouns:["yağmur","gölge","sessizlik","kırık","sis","boşluk","yalnızlık"],
verbs:["ağlar","söner","kaybolur","üşür","susar","kırılır","dağılır"],
adj:["soğuk","kırık","sessiz","yorgun","karanlık"]
},
fun:{
nouns:["sokak","ışık","ritim","şehir","parti","dans","enerji"],
verbs:["zıplar","akar","döner","patlar","güler","coşar"],
adj:["hızlı","renkli","çılgın","canlı","enerjik"]
},
night:{
nouns:["ay","yıldız","gece","gökyüzü","rüya","gölge"],
verbs:["parlar","süzülür","akar","kaybolur","bekler"],
adj:["sessiz","mistik","karanlık","büyülü"]
},
rap:{
nouns:["flow","beat","mikrofon","sahne","ritim"],
verbs:["akar","patlar","vurur","yükselir","hızlanır"],
adj:["sert","hızlı","güçlü","ateşli"]
},
happy:{
nouns:["güneş","umut","kahkaha","ışık","neşe","mutluluk"],
verbs:["güler","parlar","coşar","büyür","koşar"],
adj:["parlak","mutlu","neşeli","enerjik"]
}
};

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function verse1(d){
return `${pick(d.nouns)} içinde ${pick(d.verbs)} bir hikaye\n${pick(d.nouns)} ${pick(d.adj)} gibi üzerimize çöker\nkalbim ${pick(d.verbs)} senin için`;
}

function chorus(name,d){
return `${name}, ${name}\niçimde ${pick(d.nouns)} var\nbu dünya ${pick(d.verbs)} ama sen yoksun`;
}

function verse2(d){
return `${pick(d.nouns)} sokaklarda seni ararım\nrüzgar ${pick(d.verbs)} adını taşır\nben ${pick(d.nouns)} içinde kaybolurum`;
}

function outro(name,d){
return `${name}...\nher şey artık ${pick(d.nouns)} bir hikaye`;
}

function generate(){

let name=document.getElementById("inputField").value||"İsimsiz Şarkı";
let m=document.getElementById("mode").value;
let d=vocab[m];

let song =
`🎵 ${name} 🎵

[Verse 1]
${verse1(d)}

[Chorus]
${chorus(name,d)}

[Verse 2]
${verse2(d)}

[Outro]
${outro(name,d)}
`;

document.getElementById("out").textContent=song;
}

</script>

</body>
</html>
